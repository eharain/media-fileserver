name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Root deps (sharp) — the spawned server.js resolves sharp from the repo root.
      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      # Runs the 22-check suite (pretest installs the test workspace's deps).
      - name: Run tests
        run: npm test
